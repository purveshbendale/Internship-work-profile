<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Static Website</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f8;
            color: #333;
            line-height: 1.6;
        }

        .container {
            width: 80%;
            max-width: 900px;
            margin: 20px auto;
        }

        header {
            background-color: #2c3e50;
            color: white;
            padding: 20px;
            border: 2px solid #1a252f;
            text-align: center;
        }

        nav {
            margin-top: 10px;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
            font-weight: bold;
        }

        section {
            background-color: white;
            margin-top: 20px;
            padding: 25px;
            border: 2px solid #dcdcdc;
            border-radius: 8px;
        }

        h2 {
            margin-bottom: 15px;
            color: #2c3e50;
        }

        p {
            margin-bottom: 10px;
        }

        form {
            display: flex;
            flex-direction: column;
        }

        label {
            margin-top: 10px;
            margin-bottom: 5px;
            font-weight: bold;
        }

        input,
        textarea {
            padding: 10px;
            border: 1px solid #bbb;
            border-radius: 4px;
        }

        textarea {
            resize: vertical;
        }

        button {
            margin-top: 15px;
            padding: 12px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        footer {
            margin-top: 20px;
            padding: 15px;
            text-align: center;
            background-color: #2c3e50;
            color: white;
            border: 2px solid #1a252f;
        }
    </style>
</head>
<body>

    <div class="container">

        <!-- Header -->
        <header>
            <h1>My Static Website</h1>
            <nav>
                <a href="#">Home</a>
                <a href="#">About</a>
                <a href="#">Contact</a>
            </nav>
        </header>

        <!-- Main/About Section -->
        <section>
            <h2>About Us</h2>
            <p>
                Welcome to our website. This page demonstrates a clean and
                readable layout using HTML and CSS.
            </p>
            <p>
                The design focuses on structure, spacing, typography, and
                simplicity to create a pleasant user experience.
            </p>
        </section>

        <!-- Form Section -->
        <section>
            <h2>Contact Form</h2>

            <form>
                <label for="name">Name</label>
                <input type="text" id="name" placeholder="Enter your name">

                <label for="email">Email</label>
                <input type="email" id="email" placeholder="Enter your email">

                <label for="message">Message</label>
                <textarea id="message" rows="5" placeholder="Write your message"></textarea>

                <button type="submit">Send Message</button>
            </form>
        </section>

        <!-- Footer -->
        <footer>
            <p>&copy; 2026 My Static Website.</p>
        </footer>

    </div>

</body>
</html>
