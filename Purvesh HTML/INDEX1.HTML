<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>My Static Website</title>
    <link rel="stylesheet" href="style.css">

</head>
<body>

    <div class="container">
        <header>
            <h1>My Static Website</h1>
            <nav>
                <a href="#">Home</a>
                <a href="#">About</a>
                <a href="#">Contact</a>
            </nav>
        </header>

        <section>
            <h2>About Us</h2>
            <p>
                Welcome to our website. This page demonstrates a clean and
                readable layout using HTML and CSS.
            </p>
            <p>
                The design focuses on structure, spacing, typography, and
                simplicity to create a pleasant user experience.
            </p>
        </section>

        <section>
            <h2>Contact Form</h2>

            <form>
                <label for="name">Name</label>
                <input type="text" id="name" placeholder="Enter your name">

                <label for="email">Email</label>
                <input type="email" id="email" placeholder="Enter your email">

                <label for="message">Message</label>
                <textarea id="message" rows="5" placeholder="Write your message"></textarea>

                <button type="submit">Send Message</button>
            </form>
        </section>

        <footer>
            <p>&copy; 2026 My Static Website.</p>
        </footer>

    </div>

</body>
</html>
