<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Employee Registration Form</title>
    <link rel="stylesheet" href="style6.css">
</head>
<body>

<div class="container">

<h1>Employee Registration</h1>

<form id="employeeForm">

    <input
        type="text"
        id="name"
        placeholder="Employee Name">

    <input
        type="email"
        id="email"
        placeholder="Email">

    <input
        type="text"
        id="department"
        placeholder="Department">

    <input
        type="number"
        id="salary"
        placeholder="Salary">

    <button type="submit">
        Register Employee
    </button>

</form>

<p id="message"></p>

<h2>Statistics</h2>

<p>Total Employees :
<span id="total">0</span></p>

<p>Average Salary :
<span id="average">0</span></p>

<p>Highest Salary :
<span id="highest">0</span></p>

<h2>Employee List</h2>

<div id="employeeList"></div>

</div>

<script src="script6.js"></script>

</body>
</html>
