<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShoeVerse | Product Details</title>

<link rel="stylesheet" href="STYLEPROJECT.CSS">
</head>

<body>

<header>

<div class="logo">👟 ShoeVerse</div>

<nav>
<ul>

<li><a href="INDEXPROJECT.HTML">Home</a></li>

<li><a href="gallery.html">Gallery</a></li>

<li><a href="about.html">About</a></li>

<li><a href="contact.html">Contact</a></li>

<li><a href="wishlist.html">Wishlist</a></li>

<li><a href="cart.html">Cart</a></li>

<li><a href="login.html">Login</a></li>

</ul>
</nav>

</header>

<section class="details-section">

<div class="details-card">

<img id="productImage" src="" alt="Shoe">

<div class="details-content">

<h1 id="productTitle">Shoe Name</h1>

<h2 id="productPrice"></h2>

<h3 id="productBrand"></h3>

<p id="productDescription"></p>

<button class="btn" onclick="addToCart()">
🛒 Add to Cart
</button>

<button class="btn" onclick="addToWishlist()">
❤️ Add to Wishlist
</button>

<br><br>

<a href="gallery.html" class="btn">
⬅ Back to Gallery
</a>

</div>

</div>

</section>

<footer>

<p>
ShoeVerse
</p>

</footer>

<script>

const params = new URLSearchParams(window.location.search);

const product = JSON.parse(
decodeURIComponent(params.get("data"))
);

document.getElementById("productTitle").innerHTML = product.title;

document.getElementById("productPrice").innerHTML = product.price;

document.getElementById("productBrand").innerHTML =
"Brand : " + product.brand;

document.getElementById("productDescription").innerHTML =
product.description;

document.getElementById("productImage").src =
product.image;

function addToCart(){

let cart =
JSON.parse(localStorage.getItem("cart")) || [];

cart.push(product);

localStorage.setItem("cart",JSON.stringify(cart));

alert("Added to Cart Successfully!");

}

function addToWishlist(){

let wishlist =
JSON.parse(localStorage.getItem("wishlist")) || [];

wishlist.push(product);

localStorage.setItem("wishlist",JSON.stringify(wishlist));

alert("Added to Wishlist Successfully!");

}

</script>

</body>
</html>
