<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cart | ShoeWorld</title>

<link rel="stylesheet" href="STYLEPROJECT.CSS">

</head>

<body>

<header>

<div class="logo">👟 ShoeWorld</div>

<nav>

<ul>

<li><a href="INDEXPROJECT.HTML">Home</a></li>

<li><a href="gallery.html">Gallery</a></li>

<li><a href="about.html">About</a></li>

<li><a href="contact.html">Contact</a></li>

<li><a href="wishlist.html">Wishlist</a></li>

<li><a href="cart.html">Cart</a></li>

<li><a href="login.html">Login</a></li>

</ul>

</nav>

</header>

<section class="products">

<h1 align="center">🛒 Shopping Cart</h1>

<div class="product-list" id="cartItems">

</div>

<h2 align="center" id="totalPrice"></h2>

</section>

<footer>

<p>

    ShoeWorld

</p>

</footer>

<script>

let cart =
JSON.parse(localStorage.getItem("cart")) || [];

let html="";

let total=0;

if(cart.length==0){

html="<h2>Your Cart is Empty.</h2>";

}

cart.forEach(function(item,index){

let price=parseInt(item.price.replace(/[₹,]/g,""));

total+=price;

html+=`

<div class="product-card">

<img src="${item.image}">

<h3>${item.title}</h3>

<p>${item.price}</p>

<button class="btn"

onclick="removeCart(${index})">

Remove

</button>

</div>

`;

});

document.getElementById("cartItems").innerHTML=html;

document.getElementById("totalPrice").innerHTML=

"Total Price : ₹"+total;

function removeCart(index){

cart.splice(index,1);

localStorage.setItem("cart",JSON.stringify(cart));

location.reload();

}

</script>

</body>
</html>
