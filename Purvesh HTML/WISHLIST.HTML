<nav>

</header>

<section class="products">

<h1 align="center">❤️ My Wishlist</h1>

<div class="product-list" id="wishlistItems">

</div>

</section>

<footer>

<p>ShoeWorld</p>

</footer>

<script>

let wishlist =
JSON.parse(localStorage.getItem("wishlist")) || [];

let output="";

if(wishlist.length==0){

output="<h2>No Shoes in Wishlist.</h2>";

}

wishlist.forEach(function(item,index){

output+=`

<div class="product-card">

<img src="${item.image}">

<h3>${item.title}</h3>

<p>${item.price}</p>

<button class="btn" onclick="removeItem(${index})">

Remove

</button>

</div>

`;

});

document.getElementById("wishlistItems").innerHTML=output;

function removeItem(index){

wishlist.splice(index,1);

localStorage.setItem("wishlist",JSON.stringify(wishlist));

location.reload();

}

</script>

</body>
</html>
